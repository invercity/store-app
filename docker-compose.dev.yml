services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: store
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    build:
      context: ./server
      target: development
    command: sh -c "npx prisma migrate deploy"
    env_file:
      - ./server/.env.docker
    volumes:
      - ./server:/server
      - /server/node_modules
    depends_on:
      - db

  seed:
    build:
      context: ./server
      target: development
    command: sh -c "npx prisma db seed"
    env_file:
      - ./server/.env.docker
    volumes:
      - ./server:/server
      - /server/node_modules
    depends_on:
      - migrate
    restart: "no"

  server:
    build:
      context: ./server
      target: development
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env.docker
    volumes:
      - ./server:/server
      - /server/node_modules
    depends_on:
      - seed

  client:
    build:
      context: ./client
      target: development
    ports:
      - "5173:5173"
    volumes:
      - ./client:/client
      - /client/node_modules
    depends_on:
      - server

volumes:
  postgres_data: