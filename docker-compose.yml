services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: store
    ports:
      - "5432:5432"

  migrate:
    build:
      context: ./server
      target: development
    command: sh -c "npx prisma migrate deploy"
    env_file:
      - ./server/.env.docker
    volumes:
      - ./server:/server
      - /server/node_modules
    depends_on:
      - db

  server:
    build:
      context: ./server
      target: production
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env.docker
    depends_on:
      - migrate

  client:
    build:
      context: ./client
      target: production
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  postgres_data: