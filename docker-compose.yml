services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: store
    ports:
      - "5432:5432"

  server:
    build:
      context: ./server
      target: production
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env.docker
    depends_on:
      - db

  client:
    build:
      context: ./client
      target: production
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server